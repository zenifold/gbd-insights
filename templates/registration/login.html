{% extends "base.html" %}
{% block title %}Sign in — GBD Insights{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-6">
    <div class="text-center mb-6">
        <div class="inline-grid place-items-center w-14 h-14 rounded-2xl bg-primary/15 text-primary text-3xl mb-3">🌱</div>
        <h1 class="text-2xl font-bold">Welcome back</h1>
        <p class="opacity-60 text-sm">Greener by Default — Foodservice Insights</p>
    </div>

    <div class="card bg-base-100 shadow-sm border border-base-200 rounded-2xl">
        <div class="card-body">
            {% if form.errors %}
            <div class="alert alert-error text-sm">Incorrect username or password.</div>
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <label class="form-control w-full">
                    <span class="label-text mb-1 font-medium">Username</span>
                    <input name="username" class="input input-bordered w-full" autofocus required>
                </label>
                <label class="form-control w-full">
                    <span class="label-text mb-1 font-medium">Password</span>
                    <input name="password" type="password" class="input input-bordered w-full" required>
                </label>
                <input type="hidden" name="next" value="{{ next }}">
                <button class="btn btn-primary w-full">Sign in</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
