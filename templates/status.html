{% extends "base.html" %}
{% block title %}Analysis status — GBD Insights{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <a href="{% url 'dashboard' %}" class="text-sm opacity-60 hover:opacity-100">← Back to runs</a>

    <div class="card bg-base-100 shadow-sm border border-base-200 rounded-2xl mt-3">
        <div class="card-body">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h1 class="text-xl font-bold">{{ run.client.name }}</h1>
                    <p class="font-mono text-xs opacity-60">{{ run.source_filename }}</p>
                </div>
                {% if run.tags.all %}
                <div class="flex flex-wrap gap-1 justify-end">
                    {% for tag in run.tags.all %}<span class="badge badge-ghost badge-sm">{{ tag.name }}</span>{% endfor %}
                </div>
                {% endif %}
            </div>

            <div id="status" hx-get="{% url 'run_status' run.id %}"
                 hx-trigger="load, every 2s" hx-swap="outerHTML">
                <div class="flex items-center gap-3 py-4">
                    <span class="loading loading-dots loading-md"></span>
                    <span class="opacity-60">Loading…</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
