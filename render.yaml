# Render blueprint — FREE single web service (good for demos).
# Uploads are processed inline in the web service (PROCESS_INLINE=true), so no
# paid background worker is needed. Database & Storage are Supabase (external).
#
# To scale beyond a demo: add a second service of `type: worker` with
# `dockerCommand: python manage.py run_worker`, set PROCESS_INLINE=false, and move
# both services to a paid plan (the worker can't run on the free tier).
services:
  - type: web
    name: gbd-insights-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PROCESS_INLINE        # process uploads in-request (no worker needed)
        value: "true"
      - key: WEB_CONCURRENCY       # 1 gunicorn worker keeps memory under the free 512MB
        value: "1"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS   # e.g. https://gbd-insights-web.onrender.com
        sync: false
      - key: DATABASE_URL          # Supabase SESSION-mode connection (port 5432)
        sync: false
      - key: STORAGE_BACKEND
        value: supabase
      - key: STORAGE_BUCKET
        value: gbd-procurement
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY  # server-side only
        sync: false
# Migrations are already applied to Supabase. After future schema changes, run
# them once from the Render Shell:  python manage.py migrate
