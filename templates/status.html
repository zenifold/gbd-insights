{% extends "base.html" %}
{% block title %}Analysis status — GBD Insights{% endblock %}

{% block content %}
<div class="card bg-base-100 shadow-md">
    <div class="card-body">
        <h1 class="card-title text-2xl">Analysis</h1>
        <p class="opacity-70">
            Client: <span class="font-medium">{{ run.client.name }}</span><br>
            File: <span class="font-mono text-sm">{{ run.source_filename }}</span>
        </p>

        <div id="status" hx-get="{% url 'run_status' run.id %}"
             hx-trigger="load, every 2s" hx-swap="outerHTML">
            <span class="loading loading-dots loading-md"></span>
        </div>

        <a href="{% url 'upload_page' %}" class="link link-hover text-sm mt-4">← Upload another file</a>
    </div>
</div>
{% endblock %}
