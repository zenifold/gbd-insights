name: Deploy to Render

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: gbd_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv sync --frozen
        uv pip install pytest pytest-django
    
    - name: Build Tailwind CSS
      env:
        DATABASE_URL: postgresql://gbd_app:gbd_app_password@localhost:5432/gbd_test
        DJANGO_SECRET_KEY: test-secret-key-for-ci
        DJANGO_DEBUG: "True"
        DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        PUBLIC_BASE_URL: http://localhost:8000
        STORAGE_BACKEND: local
        STORAGE_BUCKET: test-bucket
        BASIC_AUTH_USER: testuser
        BASIC_AUTH_PASS: testpass
      run: |
        uv run python manage.py tailwind build
    
    - name: Collect static files
      env:
        DATABASE_URL: postgresql://gbd_app:gbd_app_password@localhost:5432/gbd_test
        DJANGO_SECRET_KEY: test-secret-key-for-ci
        DJANGO_DEBUG: "True"
        DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        PUBLIC_BASE_URL: http://localhost:8000
        STORAGE_BACKEND: local
        STORAGE_BUCKET: test-bucket
        BASIC_AUTH_USER: testuser
        BASIC_AUTH_PASS: testpass
      run: |
        uv run python manage.py collectstatic --noinput
    
    - name: Create non-superuser role for RLS testing
      env:
        DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/gbd_test
      run: |
        uv run python manage.py dbshell --database=default -- -c "
          CREATE USER gbd_app WITH PASSWORD 'gbd_app_password' CREATEDB NOCREATEROLE;
          GRANT ALL PRIVILEGES ON DATABASE gbd_test TO gbd_app;
          ALTER DATABASE gbd_test OWNER TO gbd_app;
        "
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql://gbd_app:gbd_app_password@localhost:5432/gbd_test
        DJANGO_SECRET_KEY: test-secret-key-for-ci
        DJANGO_DEBUG: "True"
        DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        PUBLIC_BASE_URL: http://localhost:8000
        STORAGE_BACKEND: local
        STORAGE_BUCKET: test-bucket
        BASIC_AUTH_USER: testuser
        BASIC_AUTH_PASS: testpass
      run: |
        uv run python manage.py migrate --noinput
        uv run pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      run: |
        if [ -n "$RENDER_API_KEY" ]; then
          curl -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/srv-${{ secrets.RENDER_SERVICE_ID }}/deploys
        else
          echo "RENDER_API_KEY not set, skipping deployment"
        fi